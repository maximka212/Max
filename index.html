<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM: ASCENSION v23</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --neon: #00d4ff; --danger: #ff0044; --panel: #0a0a0c; }
        body { 
            background: var(--bg); background-image: radial-gradient(circle at 50% 50%, #0a111a 0%, #000 90%);
            color: #eee; font-family: 'Orbitron', sans-serif; margin: 0; padding: 0 20px; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-top: 45px; margin-bottom: 20px; }
        .rank-container { font-size: 1.4em; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .rank-letter { color: var(--danger); text-shadow: 0 0 15px var(--danger); margin-left: 5px; }
        
        .menu-btn { 
            width: 50px; height: 50px; background: rgba(0,212,255,0.05); border: 2px solid var(--neon); 
            border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; 
        }
        .menu-btn div { width: 24px; height: 2px; background: var(--neon); box-shadow: 0 0 5px var(--neon); }

        /* ЦЕНТР */
        .title-display { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .icon-circle {
            width: 210px; height: 210px; border-radius: 50%; border: 4px solid var(--rank-color);
            display: flex; align-items: center; justify-content: center;
            filter: drop-shadow(0 0 25px var(--rank-color)); transition: 0.8s;
        }
        .icon-svg { width: 120px; height: 120px; fill: var(--rank-color); transition: 0.8s; }

        /* НИЖНЯЯ ЗОНА */
        .lvl-zone { width: 100%; margin-top: auto; padding-bottom: 70px; }
        .lvl-labels { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 700; color: var(--neon); font-size: 0.9em; }
        #display-name { color: #fff; text-shadow: 0 0 10px var(--neon); text-transform: uppercase; }

        .progress-container { width: 100%; height: 35px; background: #050505; border: 2px solid var(--neon); border-radius: 10px; overflow: hidden; }
        #exp-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #005a77, var(--neon), #fff); transition: 0.5s; display: flex; align-items: center; justify-content: center; font-size: 0.8em; color: #000; font-weight: 900; }

        /* МОДАЛКИ */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .modal { width: 88%; max-height: 85vh; background: #050507; border: 2px solid var(--neon); border-radius: 20px; padding: 25px; overflow-y: auto; }
        .modal-title { color: var(--neon); text-align: center; margin-bottom: 20px; font-weight: 900; text-shadow: 0 0 10px var(--neon); text-transform: uppercase; }
        
        .btn-list { width: 100%; padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid #1a1a22; color: #fff; margin-bottom: 12px; border-radius: 12px; font-family: 'Orbitron'; font-size: 11px; display: flex; justify-content: space-between; border-left: 4px solid var(--neon); transition: 0.2s; align-items: center; }
        .btn-list:active { background: var(--neon); color: #000; }

        .input-box { width: 100%; background: #000; border: 1px solid var(--neon); color: #fff; padding: 12px; border-radius: 8px; font-family: 'Orbitron'; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; }
        
        /* СЕТКА ДЛЯ ПОДХОДОВ */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-grid input { margin-bottom: 0; }
        
        .back-btn { text-align: center; color: #555; margin-top: 15px; cursor: pointer; font-size: 0.8em; letter-spacing: 2px; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #111; font-size: 0.85em; }
    </style>
</head>
<body style="--rank-color: #cd7f32;">

<div class="header">
    <div class="rank-container"><span id="rank-word">BRONZE</span><span class="rank-letter" id="rank-let">E</span></div>
    <div class="menu-btn" onclick="openModal('mainMenu')"><div></div><div></div><div></div></div>
</div>

<div class="title-display">
    <div class="icon-circle" id="main-circle">
        <svg class="icon-svg" viewBox="0 0 24 24"><path id="svg-path" d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM15.5 13.5L14 15.5H10L8.5 13.5V10.5L10 8.5H14L15.5 10.5V13.5Z"/></svg>
    </div>
</div>

<div class="lvl-zone">
    <div class="lvl-labels"><span>LVL <span id="current-lvl">1</span></span><span id="display-name">PLAYER</span></div>
    <div class="progress-container"><div id="exp-bar">0%</div></div>
</div>

<div id="mainMenu" class="overlay"><div class="modal">
    <div class="modal-title">SYSTEM MENU</div>
    <button class="btn-list" onclick="openModal('profileModal')">USER PROFILE <span>[OPEN]</span></button>
    <button class="btn-list" onclick="openModal('ranksListModal')">RANK HIERARCHY <span>[VIEW]</span></button>
    <button class="btn-list" onclick="openModal('catModal')">TRAINING LOG <span>[START]</span></button>
    <div class="back-btn" onclick="closeModal('mainMenu')">[ CLOSE ]</div>
</div></div>

<div id="profileModal" class="overlay"><div class="modal">
    <div class="modal-title">PLAYER PROFILE</div>
    <input type="text" id="p-name" class="input-box" placeholder="NAME">
    <input type="number" id="p-age" class="input-box" placeholder="AGE">
    <input type="number" id="p-height" class="input-box" placeholder="HEIGHT (CM)">
    <input type="number" id="p-weight" class="input-box" placeholder="WEIGHT (KG)">
    <button class="btn-list" style="background:var(--neon); color:#000; justify-content:center; font-weight:900;" onclick="saveProfile()">UPDATE DATA</button>
    <div class="back-btn" onclick="openModal('mainMenu')">[ BACK ]</div>
</div></div>

<div id="ranksListModal" class="overlay"><div class="modal">
    <div class="modal-title">RANKING SYSTEM</div>
    <div id="ranks-container"></div>
    <div class="back-btn" onclick="openModal('mainMenu')">[ BACK ]</div>
</div></div>

<div id="catModal" class="overlay"><div class="modal"><div class="modal-title">CATEGORY</div><div id="cat-list"></div><div class="back-btn" onclick="openModal('mainMenu')">[ BACK ]</div></div></div>
<div id="subModal" class="overlay"><div class="modal"><h3 id="sub-title" class="modal-title"></h3><div id="sub-list"></div><div class="back-btn" onclick="openModal('catModal')">[ BACK ]</div></div></div>
<div id="exModal" class="overlay"><div class="modal"><h3 id="ex-title" class="modal-title"></h3><div id="ex-list"></div><div id="ex-back-btn" class="back-btn">[ BACK ]</div></div></div>

<div id="weightModal" class="overlay"><div class="modal">
    <h3 id="final-ex-name" class="modal-title"></h3>
    <input type="number" id="w-val" class="input-box" style="border-color:var(--danger); color:var(--danger)" placeholder="WEIGHT (KG)">
    <div class="input-grid">
        <input type="number" id="s-val" class="input-box" placeholder="SETS">
        <input type="number" id="r-val" class="input-box" placeholder="REPS">
    </div>
    <button class="btn-list" style="background:var(--danger); color:#fff; justify-content:center; border:none; font-weight:900;" onclick="addExp()">REGISTER RESULT</button>
    <div class="back-btn" onclick="closeModal('weightModal')">[ CANCEL ]</div>
</div></div>

<script>
    let db = JSON.parse(localStorage.getItem('SYSTEM_V23')) || { lvl: 1, exp: 0, records: {}, profile: {name:'PLAYER'} };

    const rankData = [
        { lvl: 1, name: "BRONZE", let: "E", col: "#cd7f32" },
        { lvl: 5, name: "SILVER", let: "D", col: "#c0c0c0" },
        { lvl: 15, name: "GOLD", let: "B", col: "#ffd700" },
        { lvl: 30, name: "PLATINUM", let: "A", col: "#00d4ff" },
        { lvl: 50, name: "MASTER", let: "S", col: "#a335ee" },
        { lvl: 80, name: "GRAND MASTER", let: "SS", col: "#ff8000" },
        { lvl: 100, name: "MONARCH", let: "SSS", col: "#ff0044" }
    ];

    const trainingData = {
        'ГРУДЬ': {
            'ВЕРХ': ['Жим штанги накл.', 'Жим гантелей накл.', 'Разводка накл.', 'Кроссовер снизу'],
            'НИЗ': ['Жим головой вниз', 'Брусья с весом', 'Кроссовер сверху'],
            'ЦЕНТР': ['Жим лежа', 'Жим гантелей гориз.', 'Хаммер', 'Бабочка', 'Пуловер']
        },
        'СПИНА': {
            'ШИРИНА': ['Подтягивания', 'Верхний блок', 'Тяга к груди', 'Пулловер на блоке'],
            'ТОЛЩИНА': ['Тяга штанги накл.', 'Тяга гантели', 'Тяга Т-грифа', 'Рычажная тяга'],
            'НИЗ': ['Становая тяга', 'Гиперэкстензия']
        },
        'НОГИ': {
            'ПЕРЕД': ['Приседания', 'Жим ногами', 'Разгибания ног', 'Гакк-присед', 'Выпады'],
            'ЗАД': ['Мертвая тяга', 'Сгибания ног'],
            'ИКРЫ/ЯГОДИЦЫ': ['Икры стоя', 'Икры сидя', 'Ягодичный мостик']
        },
        'РУКИ': {
            'БИЦЕПС': ['ПШН стоя', 'Молотки', 'Скамья Скотта', 'Концентрир. подъем'],
            'ТРИЦЕПС': ['Французский жим', 'Узкий жим', 'Блок вниз', 'Брусья на трицепс'],
            'ПЛЕЧИ': ['Жим гантелей вверх', 'Махи в стороны', 'Махи в наклоне', 'Махи вперед'],
            'ПРЕДПЛЕЧЬЯ': ['Сгибания кистей', 'Обратный хват']
        },
        'ПРЕСС/ШЕЯ': {
            'ПРЕСС': ['Скручивания', 'Подъем ног', 'Колесо', 'Книжка'],
            'ШЕЯ': ['Подъемы головы', 'Мост']
        }
    };

    const icons = {
        fist: "M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM15.5 13.5L14 15.5H10L8.5 13.5V10.5L10 8.5H14L15.5 10.5V13.5Z",
        skull: "M12 2C7.03 2 3 6.03 3 11C3 15.11 5.75 18.57 9.5 19.64V21H10.5V19.97C11 20 11.5 20 12 20C12.5 20 13 20 13.5 19.97V21H14.5V19.64C18.25 18.57 21 15.11 21 11C21 6.03 16.97 2 12 2ZM9 13H7V11H9V13ZM17 13H15V11H17V13Z"
    };

    function openModal(id) { 
        document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); 
        document.getElementById(id).style.display='flex';
        if(id === 'ranksListModal') renderRanks();
    }
    function closeModal(id) { document.getElementById(id).style.display='none'; }

    function renderRanks() {
        const cont = document.getElementById('ranks-container');
        cont.innerHTML = '';
        rankData.forEach(r => {
            cont.innerHTML += `<div class="rank-item" style="color:${r.col}"><span>${r.name} [${r.let}]</span><span>LVL ${r.lvl}</span></div>`;
        });
    }

    function saveProfile() {
        db.profile.name = document.getElementById('p-name').value || 'PLAYER';
        db.profile.age = document.getElementById('p-age').value;
        db.profile.height = document.getElementById('p-height').value;
        db.profile.weight = document.getElementById('p-weight').value;
        save(); update(); openModal('mainMenu');
    }

    function initCats() {
        const list = document.getElementById('cat-list'); list.innerHTML = '';
        Object.keys(trainingData).forEach(cat => {
            let b = document.createElement('button'); b.className = 'btn-list'; b.innerHTML = cat + ' <span>>></span>';
            b.onclick = () => showSubs(cat); list.appendChild(b);
        });
    }

    function showSubs(cat) {
        document.getElementById('sub-title').innerText = cat;
        const list = document.getElementById('sub-list'); list.innerHTML = '';
        Object.keys(trainingData[cat]).forEach(sub => {
            let b = document.createElement('button'); b.className = 'btn-list'; b.innerHTML = sub + ' <span>>></span>';
            b.onclick = () => showEx(cat, sub); list.appendChild(b);
        }); openModal('subModal');
    }

    function showEx(cat, sub) {
        document.getElementById('ex-title').innerText = sub;
        const list = document.getElementById('ex-list'); list.innerHTML = '';
        trainingData[cat][sub].forEach(ex => {
            let rec = db.records[ex] || {w:0, s:0, r:0};
            let displayText = rec.w > 0 ? `${rec.w}KG | ${rec.s}x${rec.r}` : "0 KG";
            let b = document.createElement('button'); b.className = 'btn-list'; b.innerHTML = `<span>${ex}</span> <span style="color:var(--neon)">${displayText}</span>`;
            b.onclick = () => { window.currentEx = ex; document.getElementById('final-ex-name').innerText = ex; openModal('weightModal'); };
            list.appendChild(b);
        }); document.getElementById('ex-back-btn').onclick = () => showSubs(cat); openModal('exModal');
    }

    function addExp() {
        const w = parseFloat(document.getElementById('w-val').value) || 0;
        const s = parseInt(document.getElementById('s-val').value) || 0;
        const r = parseInt(document.getElementById('r-val').value) || 0;
        
        if(w > 0) { 
            db.records[window.currentEx] = {w, s, r}; 
            db.exp += 25; 
            if(db.exp >= 100) { db.lvl++; db.exp = 0; } 
            save(); update(); closeModal('weightModal'); 
        }
        document.getElementById('w-val').value = ''; document.getElementById('s-val').value = ''; document.getElementById('r-val').value = '';
    }

    function save() { localStorage.setItem('SYSTEM_V23', JSON.stringify(db)); }

    function update() {
        document.getElementById('current-lvl').innerText = db.lvl;
        document.getElementById('display-name').innerText = db.profile.name;
        document.getElementById('exp-bar').style.width = db.exp + '%';
        document.getElementById('exp-bar').innerText = db.exp + '%';
        
        document.getElementById('p-name').value = db.profile.name || '';
        document.getElementById('p-age').value = db.profile.age || '';
        document.getElementById('p-height').value = db.profile.height || '';
        document.getElementById('p-weight').value = db.profile.weight || '';

        let cur = rankData[0];
        for(let r of rankData) { if(db.lvl >= r.lvl) cur = r; }

        document.getElementById('rank-word').innerText = cur.name;
        document.getElementById('rank-word').style.color = cur.col;
        document.getElementById('rank-word').style.textShadow = `0 0 15px ${cur.col}`;
        document.getElementById('rank-let').innerText = cur.let;
        document.body.style.setProperty('--rank-color', cur.col);
        
        let icon = db.lvl >= 15 ? icons.skull : icons.fist;
        document.getElementById('svg-path').setAttribute('d', icon);
    }

    initCats(); update();
</script>
</body>
</html>
