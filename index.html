<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM: SOLO LEVELING</title>
    <style>
        :root { --blue: #00d4ff; --red: #ff0055; --bg: #0a0a0c; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* Стиль Системы */
        .window { border: 2px solid var(--blue); background: rgba(0, 212, 255, 0.05); padding: 15px; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); margin-bottom: 20px; }
        .header { text-align: center; border-bottom: 1px solid var(--blue); margin-bottom: 15px; letter-spacing: 3px; }
        
        .stat-row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 1.1em; }
        .lvl-text { color: var(--blue); font-weight: bold; font-size: 1.4em; }
        
        .exp-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
        .exp-fill { height: 100%; background: var(--blue); transition: width 0.5s; box-shadow: 0 0 10px var(--blue); }

        .quest-box { border-left: 3px solid var(--red); background: #161618; padding: 15px; }
        .quest-title { color: var(--red); margin: 0 0 10px 0; font-size: 1em; text-transform: uppercase; }
        
        .btn-upgrade { width: 100%; padding: 15px; background: none; border: 1px solid var(--blue); color: var(--blue); font-weight: bold; margin-top: 20px; cursor: pointer; text-transform: uppercase; }
        .btn-upgrade:active { background: var(--blue); color: #000; }
        
        .log { font-size: 0.8em; color: #666; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="window">
    <div class="header">ИНФОРМАЦИЯ ОБ ИГРОКЕ</div>
    <div class="stat-row">
        <span>УРОВЕНЬ: <span id="lvl" class="lvl-text">1</span></span>
        <span id="rank" style="color: #888;">РАНГ: E</span>
    </div>
    <div class="exp-bar"><div id="exp-fill" class="exp-fill" style="width: 0%"></div></div>
    <div class="log">EXP: <span id="exp-val">0</span> / 100</div>

    <div style="margin-top: 20px;">
        <div class="stat-row"><span>СИЛА (STR):</span> <span id="str">10</span></div>
        <div class="stat-row"><span>ВЫНОСЛ (VIT):</span> <span id="vit">10</span></div>
    </div>
</div>

<div class="quest-box">
    <div class="quest-title">Ежедневный квест: ПРЕДЕЛ ВОЗМОЖНОСТЕЙ</div>
    <div id="tasks">
        • Жим/Присед (Тяжелый): 5х5<br>
        • Подтягивания: 3 до отказа<br>
        • Планка: 2 минуты
    </div>
</div>

<button class="btn-upgrade" onclick="gainExp(25)">Завершить тренировку (+25 EXP)</button>
<button class="btn-upgrade" style="border-color: #666; color: #666; margin-top: 10px;" onclick="resetStats()">Сброс прогресса</button>

<script>
    // Простейшая логика сохранения данных
    let stats = JSON.parse(localStorage.getItem('soloStats')) || { lvl: 1, exp: 0, str: 10, vit: 10 };

    function updateUI() {
        document.getElementById('lvl').innerText = stats.lvl;
        document.getElementById('exp-val').innerText = stats.exp;
        document.getElementById('exp-fill').style.width = stats.exp + '%';
        document.getElementById('str').innerText = stats.str;
        document.getElementById('vit').innerText = stats.vit;
        document.getElementById('rank').innerText = stats.lvl > 10 ? 'РАНГ: D' : 'РАНГ: E';
        localStorage.setItem('soloStats', JSON.stringify(stats));
    }

    function gainExp(amount) {
        stats.exp += amount;
        if (stats.exp >= 100) {
            stats.lvl++;
            stats.exp = 0;
            stats.str += 2;
            stats.vit += 1;
            alert("УРОВЕНЬ ПОВЫШЕН! Вы стали сильнее.");
        }
        updateUI();
    }

    function resetStats() {
        if(confirm("Сбросить весь прогресс?")) {
            stats = { lvl: 1, exp: 0, str: 10, vit: 10 };
            updateUI();
        }
    }

    updateUI();
</script>

</body>
</html>
