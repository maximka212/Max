<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM: ASCENSION v26</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --neon: #00d4ff; --danger: #ff0044; --rank-color: #cd7f32; }
        body { 
            background: var(--bg); background-image: radial-gradient(circle at 50% 50%, #0a111a 0%, #000 90%);
            color: #eee; font-family: 'Orbitron', sans-serif; margin: 0; padding: 0; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }
        
        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; margin-top: 40px; }
        .rank-display { font-size: 1.5em; font-weight: 900; letter-spacing: 3px; margin-bottom: 5px; }
        .sys-time { font-size: 0.7em; color: var(--neon); opacity: 0.7; letter-spacing: 2px; }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; width: 100%; box-sizing: border-box; }
        
        /* СЕКЦИИ (СКРЫТЫЕ ПО УМОЛЧАНИЮ) */
        .page { display: none; width: 100%; flex-direction: column; align-items: center; animation: fadeIn 0.3s ease; }
        .page.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ИКОНКА ГЛАВНОГО ЭКРАНА */
        .icon-circle {
            width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--rank-color);
            display: flex; align-items: center; justify-content: center;
            filter: drop-shadow(0 0 20px var(--rank-color)); margin-bottom: 30px;
        }
        .icon-svg { width: 120px; height: 120px; fill: var(--rank-color); }

        /* LVL ZONE */
        .lvl-container { width: 100%; max-width: 320px; margin-top: 20px; }
        .lvl-labels { display: flex; justify-content: space-between; font-size: 0.8em; margin-bottom: 10px; color: var(--neon); }
        .progress-bar { width: 100%; height: 25px; background: #080808; border: 1px solid var(--neon); border-radius: 5px; overflow: hidden; position: relative; }
        #exp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #005a77, var(--neon)); transition: 0.6s; }

        /* НИЖНЯЯ ПАНЕЛЬ НАВИГАЦИИ */
        .nav-bar {
            height: 75px; background: #050507; border-top: 2px solid #1a1a22;
            display: grid; grid-template-columns: repeat(5, 1fr); align-items: center;
            padding-bottom: 15px; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #444; font-size: 0.55em; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .nav-icon { width: 22px; height: 22px; fill: currentColor; }

        /* МОДАЛКИ (ДЛЯ ВВОДА ДАННЫХ) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal { width: 85%; background: #08080a; border: 2px solid var(--neon); border-radius: 15px; padding: 20px; }
        
        /* СПИСКИ И КНОПКИ */
        .list-item { width: 100%; padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid #1a1a22; color: #fff; margin-bottom: 10px; border-radius: 10px; font-family: 'Orbitron'; font-size: 0.7em; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .list-item.done { border-left: 4px solid #00ff88; color: #00ff88; }
        .input-box { width: 100%; background: #000; border: 1px solid var(--neon); color: #fff; padding: 12px; border-radius: 8px; font-family: 'Orbitron'; margin-bottom: 10px; box-sizing: border-box; text-align: center; }
        
        .pr-card { width: 100%; padding: 12px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; font-size: 0.8em; }
        .rank-row { width: 100%; padding: 10px; display: flex; justify-content: space-between; font-size: 0.8em; border-left: 3px solid transparent; }
    </style>
</head>
<body>

    <div class="header">
        <div class="rank-display"><span id="rank-name" style="color:var(--rank-color)">BRONZE</span> <span style="color:var(--danger)">E</span></div>
        <div class="sys-time" id="clock">00:00:00</div>
    </div>

    <div class="main-content">
        
        <div id="page-home" class="page active">
            <div class="icon-circle">
                <svg class="icon-svg" viewBox="0 0 24 24"><path id="svg-path" d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM15.5 13.5L14 15.5H10L8.5 13.5V10.5L10 8.5H14L15.5 10.5V13.5Z"/></svg>
            </div>
            <div class="lvl-container">
                <div class="lvl-labels"><span id="p-display-name">PLAYER</span> <span>LVL <span id="lvl-num">1</span></span></div>
                <div class="progress-bar"><div id="exp-fill"></div></div>
                <div style="text-align: center; font-size: 0.6em; margin-top: 10px; color: #555;">DAILY PROGRESS: <span id="daily-count">0</span> COMPLETED</div>
            </div>
        </div>

        <div id="page-quests" class="page">
            <h2 style="color:var(--neon); font-size: 1em;">DAILY QUESTS</h2>
            <div id="quest-area" style="width:100%"></div>
        </div>

        <div id="page-records" class="page">
            <h2 style="color:var(--neon); font-size: 1em;">HALL OF FAME</h2>
            <div id="pr-area" style="width:100%"></div>
        </div>

        <div id="page-ranks" class="page">
            <h2 style="color:var(--neon); font-size: 1em;">RANK HIERARCHY</h2>
            <div id="rank-area" style="width:100%"></div>
        </div>

        <div id="page-profile" class="page">
            <h2 style="color:var(--neon); font-size: 1em;">CHARACTER SETTINGS</h2>
            <input type="text" id="in-name" class="input-box" placeholder="NAME">
            <input type="number" id="in-age" class="input-box" placeholder="AGE">
            <input type="number" id="in-h" class="input-box" placeholder="HEIGHT">
            <input type="number" id="in-w" class="input-box" placeholder="WEIGHT">
            <button class="list-item" style="justify-content:center; background:var(--neon); color:#000; font-weight:900;" onclick="saveProfile()">UPDATE STATUS</button>
        </div>

    </div>

    <div id="inputOverlay" class="overlay">
        <div class="modal">
            <h3 id="modal-ex-title" style="color:var(--neon); text-align:center; margin-bottom:15px; font-size:0.9em;"></h3>
            <input type="number" id="input-w" class="input-box" placeholder="WEIGHT KG">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <input type="number" id="input-s" class="input-box" placeholder="SETS">
                <input type="number" id="input-r" class="input-box" placeholder="REPS">
            </div>
            <button class="list-item" style="justify-content:center; background:var(--danger); border:none;" onclick="confirmQuest()">REGISTER</button>
            <div style="text-align:center; color:#555; font-size:0.7em; margin-top:10px;" onclick="closeInput()">CANCEL</div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('home', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            HOME
        </div>
        <div class="nav-item" onclick="showPage('quests', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
            QUESTS
        </div>
        <div class="nav-item" onclick="showPage('records', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 11.63 21 9.55 21 8V7c0-1.1-.9-2-2-2z"/></svg>
            PR
        </div>
        <div class="nav-item" onclick="showPage('ranks', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
            RANK
        </div>
        <div class="nav-item" onclick="showPage('profile', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            USER
        </div>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('SYSTEM_V26')) || {
        lvl: 1, exp: 0, pr: {}, daily: {}, dailyDoneCount: 0,
        lastDate: new Date().toDateString(),
        profile: {name:'PLAYER', age:'', h:'', w:''}
    };

    const rankData = [
        { lvl: 1, name: "BRONZE", let: "E", col: "#cd7f32" },
        { lvl: 10, name: "SILVER", let: "D", col: "#c0c0c0" },
        { lvl: 25, name: "GOLD", let: "B", col: "#ffd700" },
        { lvl: 50, name: "PLATINUM", let: "A", col: "#00d4ff" },
        { lvl: 75, name: "MASTER", let: "S", col: "#a335ee" },
        { lvl: 100, name: "GRAND MASTER", let: "SS", col: "#ff4400" }
    ];

    const exercises = ["Жим лежа", "Приседания", "Становая тяга", "Подтягивания", "Жим накл.", "Брусья", "Бицепс", "Махи"];

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(pageId === 'quests') renderQuests();
        if(pageId === 'records') renderPR();
        if(pageId === 'ranks') renderRanks();
    }

    function renderQuests() {
        const area = document.getElementById('quest-area'); area.innerHTML = '';
        exercises.forEach(ex => {
            let done = db.daily[ex];
            area.innerHTML += `<div class="list-item ${done?'done':''}" onclick="openInput('${ex}')">
                <span>${ex}</span> <span>${done?'[COMPLETED]':'[OPEN]'}</span>
            </div>`;
        });
    }

    function renderPR() {
        const area = document.getElementById('pr-area'); area.innerHTML = '';
        if(Object.keys(db.pr).length === 0) area.innerHTML = '<div style="color:#333; text-align:center">NO RECORDS</div>';
        for(let ex in db.pr) {
            let r = db.pr[ex];
            area.innerHTML += `<div class="pr-card"><span>${ex}</span> <b>${r.w}KG | ${r.s}x${r.r}</b></div>`;
        }
    }

    function renderRanks() {
        const area = document.getElementById('rank-area'); area.innerHTML = '';
        rankData.forEach(r => {
            let isReached = db.lvl >= r.lvl;
            area.innerHTML += `<div class="rank-row" style="color:${isReached?r.col:'#222'}; border-left-color:${isReached?r.col:'transparent'}">
                <span>${r.name} [${r.let}]</span> <span>LVL ${r.lvl}</span>
            </div>`;
        });
    }

    function openInput(ex) {
        window.currentEx = ex;
        document.getElementById('modal-ex-title').innerText = ex;
        document.getElementById('inputOverlay').style.display = 'flex';
    }

    function closeInput() { document.getElementById('inputOverlay').style.display = 'none'; }

    function confirmQuest() {
        const w = parseFloat(document.getElementById('input-w').value) || 0;
        const s = parseInt(document.getElementById('input-s').value) || 0;
        const r = parseInt(document.getElementById('input-r').value) || 0;

        if(w > 0) {
            if(!db.pr[window.currentEx] || w > db.pr[window.currentEx].w) db.pr[window.currentEx] = {w,s,r};
            if(!db.daily[window.currentEx]) {
                db.daily[window.currentEx] = true;
                db.dailyDoneCount++;
                db.exp += 20;
                if(db.dailyDoneCount === 3) db.exp += 50;
                if(db.dailyDoneCount === 5) db.exp += 100;
            }
            while(db.exp >= 100) { db.lvl++; db.exp -= 100; }
            save(); update(); closeInput(); renderQuests();
        }
    }

    function saveProfile() {
        db.profile.name = document.getElementById('in-name').value || 'PLAYER';
        db.profile.age = document.getElementById('in-age').value;
        db.profile.h = document.getElementById('in-h').value;
        db.profile.w = document.getElementById('in-w').value;
        save(); update(); alert("PROFILE UPDATED");
    }

    function save() { localStorage.setItem('SYSTEM_V26', JSON.stringify(db)); }

    function update() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        if(db.lastDate !== now.toDateString()) {
            db.daily = {}; db.dailyDoneCount = 0; db.lastDate = now.toDateString(); save();
        }

        document.getElementById('lvl-num').innerText = db.lvl;
        document.getElementById('p-display-name').innerText = db.profile.name;
        document.getElementById('daily-count').innerText = db.dailyDoneCount;
        document.getElementById('exp-fill').style.width = db.exp + '%';

        let cur = rankData[0];
        for(let r of rankData) if(db.lvl >= r.lvl) cur = r;
        document.getElementById('rank-name').innerText = cur.name;
        document.body.style.setProperty('--rank-color', cur.col);
        document.getElementById('svg-path').setAttribute('d', db.lvl >= 15 ? "M12 2C7.03 2 3 6.03 3 11C3 15.11 5.75 18.57 9.5 19.64V21H10.5V19.97C11 20 11.5 20 12 20C12.5 20 13 20 13.5 19.97V21H14.5V19.64C18.25 18.57 21 15.11 21 11C21 6.03 16.97 2 12 2ZM9 13H7V11H9V13ZM17 13H15V11H17V13Z" : "M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM15.5 13.5L14 15.5H10L8.5 13.5V10.5L10 8.5H14L15.5 10.5V13.5Z");
    }

    setInterval(update, 1000);
    update();
</script>
</body>
</html>
