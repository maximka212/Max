<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM: ULTIMATE DATABASE v30.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --neon: #00d4ff; --danger: #ff0044; --rank-color: #cd7f32; }
        body { 
            background: var(--bg); background-image: radial-gradient(circle at 50% 50%, #0a111a 0%, #000 90%);
            color: #eee; font-family: 'Orbitron', sans-serif; margin: 0; padding: 0; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }
        
        .header { display: flex; flex-direction: column; align-items: center; margin-top: 35px; }
        .rank-display { font-size: 1.3em; font-weight: 900; letter-spacing: 2px; }
        .sys-time { font-size: 0.7em; color: var(--danger); text-shadow: 0 0 5px var(--danger); margin-top: 4px; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; padding-bottom: 90px; }
        
        .page { display: none; width: 100%; flex-direction: column; animation: fadeIn 0.3s ease; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* УВЕЛИЧЕННЫЕ ЗНАЧКИ */
        .icon-circle { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--rank-color); display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 20px var(--rank-color)); margin: 25px auto; }
        .icon-svg { width: 100px; height: 100px; fill: var(--rank-color); }
        
        .lvl-bar { width: 100%; height: 15px; background: #080808; border: 1px solid var(--neon); border-radius: 8px; margin: 10px 0; overflow: hidden; }
        #exp-fill { height: 100%; background: var(--neon); transition: 0.5s; box-shadow: 0 0 10px var(--neon); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #050507; border-top: 1px solid #1a1a22; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #444; font-size: 0.55em; cursor: pointer; }
        .nav-item.active { color: var(--neon); text-shadow: 0 0 8px var(--neon); }
        .nav-icon { width: 26px; height: 26px; fill: currentColor; }

        .list-item { width: 100%; padding: 16px; background: rgba(255,255,255,0.02); border: 1px solid #15151a; color: #fff; margin-bottom: 8px; border-radius: 8px; font-size: 0.65em; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .list-item.done { border-left: 4px solid #00ff88; color: #00ff88; }
        
        .input-box { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 5px; margin-bottom: 10px; font-family: 'Orbitron'; text-align: center; outline: none; box-sizing: border-box; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal { width: 85%; background: #0a0a0c; border: 1px solid var(--neon); border-radius: 12px; padding: 25px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="rank-display"><span id="rank-name" style="color:var(--rank-color)">BRONZE</span> <span style="color:var(--danger)">E</span></div>
        <div class="sys-time" id="clock">00:00:00</div>
    </div>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div class="icon-circle">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM15.5 13.5L14 15.5H10L8.5 13.5V10.5L10 8.5H14L15.5 10.5V13.5Z"/></svg>
            </div>
            <div style="text-align: center;">
                <h3 id="p-display-name">PLAYER</h3>
                <div style="font-size: 0.7em; color: var(--neon); margin-bottom: 5px;">LVL <span id="lvl-num">1</span></div>
                <div class="lvl-bar"><div id="exp-fill"></div></div>
                <div style="font-size: 0.6em; color: #444; margin-top: 10px;">DAILY QUESTS: <span id="daily-count" style="color:var(--neon)">0/3</span></div>
            </div>
        </div>

        <div id="page-quests" class="page">
            <h2 style="color:var(--neon); font-size: 0.8em; border-left: 2px solid var(--neon); padding-left: 10px; margin-bottom: 20px;">QUEST LOG</h2>
            <div id="quest-list"></div>
        </div>

        <div id="page-db" class="page">
            <div id="db-back" class="back-link" style="display:none" onclick="goBackDB()">← Назад</div>
            <h2 id="db-title" style="color:var(--neon); font-size: 0.8em; margin-bottom: 20px;">DATABASE</h2>
            <div id="db-list"></div>
        </div>

        <div id="page-pr" class="page">
            <h2 style="color:var(--neon); font-size: 0.8em; margin-bottom: 20px;">RECORDS</h2>
            <div id="pr-list"></div>
        </div>

        <div id="page-user" class="page">
            <h2 style="color:var(--neon); font-size: 0.8em; margin-bottom: 20px;">USER PROFILE</h2>
            <input type="text" id="in-name" class="input-box" placeholder="NAME">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="number" id="in-h" class="input-box" placeholder="H (cm)">
                <input type="number" id="in-w" class="input-box" placeholder="W (kg)">
            </div>
            <input type="number" id="in-age" class="input-box" placeholder="AGE">
            <button class="list-item" style="justify-content:center; background:var(--neon); color:#000; font-weight:900;" onclick="saveProfile()">UPDATE DATA</button>
        </div>
    </div>

    <div id="inputOverlay" class="overlay">
        <div class="modal">
            <h4 id="modal-title" style="color:var(--neon); margin-bottom:15px;"></h4>
            <input type="number" id="input-w" class="input-box" placeholder="KG">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="number" id="input-s" class="input-box" placeholder="SETS">
                <input type="number" id="input-r" class="input-box" placeholder="REPS">
            </div>
            <button class="list-item" style="justify-content:center; background:var(--danger); border:none;" onclick="confirmEntry()">REGISTER</button>
            <p style="font-size:0.6em; color:#444; margin-top:10px; cursor:pointer;" onclick="closeInput()">CANCEL</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('home', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>HOME</div>
        <div class="nav-item" onclick="showPage('quests', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3H5v14h14V3z M12 17l-5-5 1.4-1.4 3.6 3.6 7.6-7.6L21 8l-9 9z"/></svg>QUESTS</div>
        <div class="nav-item" onclick="showPage('db', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 13.43 12 12 13.43 15.57 17 12 20.57 13.43 22 17 18.43 20.57 22 22 20.57 18.43 17z M4 5.43L5.43 4 17 15.57 15.57 17 4 5.43z"/></svg>DB</div>
        <div class="nav-item" onclick="showPage('pr', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.5 1.9 4.6 4.4 4.9.6 1.5 2 2.6 3.6 3V19H7v2h10v-2h-4v-3.1c1.6-.3 3-1.4 3.6-3 2.5-.3 4.4-2.4 4.4-4.9V7c0-1.1-.9-2-2-2z"/></svg>PR</div>
        <div class="nav-item" onclick="showPage('user', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z"/></svg>USER</div>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('SYSTEM_V30_1')) || {
        lvl: 1, exp: 0, pr: {}, daily: {}, 
        dailyQuests: [
            { id: 'q1', text: 'Записать 3 упражнения', target: 3, current: 0, done: false },
            { id: 'q2', text: 'Установить новый PR', done: false },
            { id: 'q3', text: 'Тренировка ног', done: false }
        ],
        lastDate: new Date().toDateString(),
        profile: {name:'PLAYER', h:'', w:'', age:''}
    };

    const trainingDB = {
        'ГРУДЬ': { 'ВЕРХ': ['Жим накл.'], 'ЦЕНТР': ['Жим лежа'], 'НИЗ': ['Брусья'] },
        'СПИНА': { 'ШИРИНА': ['Подтягивания'], 'ПОЯСНИЦА': ['Становая'] },
        'НОГИ': { 'БАЗА': ['Приседания'], 'ИКРЫ': ['Носки'] },
        'ПЛЕЧИ': { 'ЖИМЫ': ['Армейский жим'], 'МАХИ': ['Махи'] },
        'РУКИ': { 'БИЦЕПС': ['Штанга'], 'ТРИЦЕПС': ['Блок'] }
    };

    let dbStack = [];

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(pageId === 'quests') renderQuests();
        if(pageId === 'db') { dbStack = []; renderDB(); }
        if(pageId === 'pr') renderPR();
        if(pageId === 'user') {
            document.getElementById('in-name').value = db.profile.name;
            document.getElementById('in-h').value = db.profile.h;
            document.getElementById('in-w').value = db.profile.w;
            document.getElementById('in-age').value = db.profile.age;
        }
    }

    function renderQuests() {
        const area = document.getElementById('quest-list'); area.innerHTML = '';
        db.dailyQuests.forEach(q => {
            let status = q.done ? '[DONE]' : (q.target ? `${q.current}/${q.target}` : '[ACT]');
            area.innerHTML += `<div class="list-item ${q.done?'done':''}"><span>${q.text}</span> <span>${status}</span></div>`;
        });
    }

    function renderDB() {
        const area = document.getElementById('db-list');
        const title = document.getElementById('db-title');
        const back = document.getElementById('db-back');
        area.innerHTML = '';

        if(dbStack.length === 0) {
            title.innerText = "MUSCLE GROUPS"; back.style.display = "none";
            Object.keys(trainingDB).forEach(cat => {
                area.innerHTML += `<div class="list-item" onclick="pushDB('${cat}')">${cat} <span>>></span></div>`;
            });
        } else if(dbStack.length === 1) {
            title.innerText = dbStack[0]; back.style.display = "block";
            Object.keys(trainingDB[dbStack[0]]).forEach(sub => {
                area.innerHTML += `<div class="list-item" onclick="pushDB('${sub}')">${sub} <span>>></span></div>`;
            });
        } else {
            title.innerText = dbStack[1]; back.style.display = "block";
            trainingDB[dbStack[0]][dbStack[1]].forEach(ex => {
                area.innerHTML += `<div class="list-item" onclick="openInput('${ex}')"><span>${ex}</span> <span>LOG</span></div>`;
            });
        }
    }

    function pushDB(val) { dbStack.push(val); renderDB(); }
    function goBackDB() { dbStack.pop(); renderDB(); }

    function openInput(ex) {
        window.currentEx = ex;
        document.getElementById('modal-title').innerText = ex;
        document.getElementById('inputOverlay').style.display = 'flex';
    }
    function closeInput() { document.getElementById('inputOverlay').style.display = 'none'; }

    function confirmEntry() {
        const w = parseFloat(document.getElementById('input-w').value) || 0;
        if(w > 0) {
            if(!db.pr[window.currentEx] || w > db.pr[window.currentEx].w) {
                db.pr[window.currentEx] = {w};
                db.dailyQuests[1].done = true; 
            }
            if(!db.daily[window.currentEx]) {
                db.daily[window.currentEx] = true;
                db.dailyQuests[0].current = Math.min(db.dailyQuests[0].target, db.dailyQuests[0].current + 1);
                if(db.dailyQuests[0].current >= db.dailyQuests[0].target) db.dailyQuests[0].done = true;
                if(dbStack[0] === 'НОГИ') db.dailyQuests[2].done = true;
                db.exp += 25;
            }
            while(db.exp >= 100) { db.lvl++; db.exp -= 100; }
            save(); update(); closeInput(); renderDB();
        }
    }

    function renderPR() {
        const area = document.getElementById('pr-list'); area.innerHTML = '';
        for(let ex in db.pr) area.innerHTML += `<div class="list-item"><span>${ex}</span> <b>${db.pr[ex].w} KG</b></div>`;
    }

    function saveProfile() {
        db.profile.name = document.getElementById('in-name').value || 'PLAYER';
        db.profile.h = document.getElementById('in-h').value;
        db.profile.w = document.getElementById('in-w').value;
        db.profile.age = document.getElementById('in-age').value;
        save(); update(); alert("SYNCED");
    }

    function save() { localStorage.setItem('SYSTEM_V30_1', JSON.stringify(db)); }

    function update() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        
        // СБРОС СИСТЕМЫ В 00:00:00
        if(db.lastDate !== now.toDateString()) {
            db.daily = {}; 
            db.dailyQuests.forEach(q => { q.done = false; if(q.current) q.current = 0; });
            db.lastDate = now.toDateString(); 
            save();
            console.log("System Refresh: Quests reset at 00:00");
        }
        
        document.getElementById('lvl-num').innerText = db.lvl;
        document.getElementById('p-display-name').innerText = db.profile.name;
        document.getElementById('exp-fill').style.width = db.exp + '%';
        let dCount = db.dailyQuests.filter(q => q.done).length;
        document.getElementById('daily-count').innerText = dCount + "/3";

        const ranks = [{lvl:1, n:"BRONZE", c:"#cd7f32"}, {lvl:10, n:"SILVER", c:"#c0c0c0"}, {lvl:25, n:"GOLD", c:"#ffd700"}, {lvl:50, n:"PLATINUM", c:"#00d4ff"}];
        let r = ranks[0]; for(let x of ranks) if(db.lvl >= x.lvl) r = x;
        document.getElementById('rank-name').innerText = r.n;
        document.body.style.setProperty('--rank-color', r.c);
    }

    setInterval(update, 1000);
    update();
</script>
</body>
</html>
