<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM: ULTIMATE DATABASE v19</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --neon: #00d4ff; --danger: #ff0044; --panel: #0a0a0c; }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #0a111a 0%, #000 90%);
            color: #eee; font-family: 'Orbitron', sans-serif; margin: 0; padding: 0 20px; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: background 0.3s;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-top: 45px; margin-bottom: 20px; }
        .rank-container { font-size: 1.6em; font-weight: 900; text-transform: uppercase; }
        .rank-letter { color: var(--danger); text-shadow: 0 0 15px var(--danger); margin-left: 5px; }
        .menu-btn { 
            width: 50px; height: 50px; background: rgba(0,212,255,0.05); border: 2px solid var(--neon); 
            border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; 
            box-shadow: 0 0 15px rgba(0,212,255,0.2);
        }
        .menu-btn div { width: 24px; height: 2px; background: var(--neon); box-shadow: 0 0 5px var(--neon); }
        .title-display { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .icon-svg { width: 200px; height: 200px; filter: drop-shadow(0 0 30px var(--neon)); fill: var(--neon); }
        .lvl-zone { width: 100%; margin-top: auto; padding-bottom: 70px; }
        .lvl-labels { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 700; color: var(--neon); }
        .progress-container { width: 100%; height: 35px; background: #050505; border: 2px solid var(--neon); border-radius: 10px; overflow: hidden; }
        #exp-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #005a77, #00d4ff, #fff); transition: 0.5s; display: flex; align-items: center; justify-content: center; font-size: 0.8em; color: #000; font-weight: 900; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal { width: 85%; max-height: 80vh; background: #050507; border: 2px solid var(--neon); border-radius: 20px; padding: 20px; overflow-y: auto; }
        .modal-title { color: var(--neon); text-align: center; margin-bottom: 20px; letter-spacing: 2px; font-weight: 900; text-shadow: 0 0 10px var(--neon); }
        .btn-list { width: 100%; padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid #1a1a22; color: #fff; margin-bottom: 10px; border-radius: 10px; font-family: 'Orbitron'; font-size: 11px; display: flex; justify-content: space-between; border-left: 4px solid var(--neon); }
        .btn-list:active { background: var(--neon); color: #000; }
        .input-box { width: 100%; background: #000; border: 2px solid var(--danger); color: var(--danger); padding: 15px; border-radius: 10px; font-family: 'Orbitron'; font-size: 1.5em; text-align: center; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .back-btn { text-align: center; color: #444; margin-top: 10px; cursor: pointer; font-size: 0.7em; }
        .flash { animation: flash-blue 0.5s; }
        @keyframes flash-blue { 0% { background: var(--neon); } 100% { background: var(--bg); } }
    </style>
</head>
<body>

<div class="header">
    <div class="rank-container"><span id="rank-word">BRONZE</span><span class="rank-letter" id="rank-let">E</span></div>
    <div class="menu-btn" onclick="openModal('catModal')"><div></div><div></div><div></div></div>
</div>

<div class="title-display">
    <svg class="icon-svg" viewBox="0 0 24 24"><path id="svg-path" d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM15.5 13.5L14 15.5H10L8.5 13.5V10.5L10 8.5H14L15.5 10.5V13.5Z"/></svg>
</div>

<div class="lvl-zone">
    <div class="lvl-labels"><span>LVL <span id="current-lvl">1</span></span><span>SOLO LEVELING</span></div>
    <div class="progress-container"><div id="exp-bar">0%</div></div>
</div>

<div id="catModal" class="overlay"><div class="modal"><div class="modal-title">QUEST LOG</div><div id="cat-list"></div><div class="back-btn" onclick="closeModal('catModal')">[ CLOSE ]</div></div></div>
<div id="subModal" class="overlay"><div class="modal"><h3 id="sub-title" class="modal-title"></h3><div id="sub-list"></div><div class="back-btn" onclick="openModal('catModal')">[ BACK ]</div></div></div>
<div id="exModal" class="overlay"><div class="modal"><h3 id="ex-title" class="modal-title"></h3><div id="ex-list"></div><div id="ex-back-btn" class="back-btn">[ BACK ]</div></div></div>
<div id="weightModal" class="overlay"><div class="modal"><h3 id="final-ex-name" class="modal-title"></h3><input type="number" id="weight-input" class="input-box" placeholder="WEIGHT"><button class="btn-list" style="background:var(--danger); color:#fff; justify-content:center; border:none;" onclick="addExp()">CONFIRM</button><div class="back-btn" onclick="closeModal('weightModal')">[ CANCEL ]</div></div></div>

<script>
    let db = JSON.parse(localStorage.getItem('SYSTEM_V19')) || { lvl: 1, exp: 0, records: {} };
    const trainingData = {
        'ГРУДЬ': {
            'ВЕРХ': ['Жим штанги (наклон)', 'Жим гантелей (наклон)', 'Разводка (наклон)', 'Кроссовер снизу'],
            'НИЗ': ['Жим штанги (вниз)', 'Брусья с весом', 'Кроссовер сверху', 'Отжимания от пола'],
            'ЦЕНТР': ['Жим штанги лежа', 'Жим гантелей лежа', 'Тренажер Хаммер', 'Пуловер']
        },
        'СПИНА': {
            'ШИРИНА': ['Подтягивания (широкий)', 'Тяга верхнего блока', 'Тяга за голову', 'Тяга к груди'],
            'ТОЛЩИНА': ['Тяга штанги в наклоне', 'Тяга гантели', 'Тяга Т-грифа', 'Рычажная тяга'],
            'НИЗ': ['Становая тяга', 'Гиперэкстензия', 'Тяга нижнего блока']
        },
        'НОГИ': {
            'ПЕРЕД': ['Приседания', 'Жим ногами', 'Разгибания ног', 'Гакк-присед'],
            'ЗАД': ['Мертвая тяга', 'Сгибания лежа', 'Сгибания сидя'],
            'ИКРЫ/ЯГОДИЦЫ': ['Икры стоя', 'Икры сидя', 'Ягодичный мостик', 'Выпады']
        },
        'РУКИ': {
            'БИЦЕПС': ['ПШН (классика)', 'Молотки', 'Скамья Скотта', 'Гантели сидя'],
            'ТРИЦЕПС': ['Французский жим', 'Узкий жим', 'Блок вниз', 'Отжимания (узко)'],
            'ПЛЕЧИ': ['Жим гантелей вверх', 'Махи в стороны', 'Махи перед собой', 'Махи в наклоне']
        },
        'ПРЕСС/ШЕЯ': {
            'ПРЕСС': ['Скручивания', 'Подъем ног', 'Планка (сек)', 'Ролик'],
            'ШЕЯ': ['Подъемы головы', 'Борцовский мост']
        }
    };
    const icons = {
        fist: "M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM15.5 13.5L14 15.5H10L8.5 13.5V10.5L10 8.5H14L15.5 10.5V13.5Z",
        skull: "M12 2C7.03 2 3 6.03 3 11C3 15.11 5.75 18.57 9.5 19.64V21H10.5V19.97C11 20 11.5 20 12 20C12.5 20 13 20 13.5 19.97V21H14.5V19.64C18.25 18.57 21 15.11 21 11C21 6.03 16.97 2 12 2ZM9 13H7V11H9V13ZM17 13H15V11H17V13Z"
    };

    function openModal(id) { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); document.getElementById(id).style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    function initCats() {
        const list = document.getElementById('cat-list'); list.innerHTML = '';
        Object.keys(trainingData).forEach(cat => {
            let b = document.createElement('button'); b.className = 'btn-list'; b.innerHTML = cat + ' <span>>></span>';
            b.onclick = () => showSubs(cat); list.appendChild(b);
        });
    }
    function showSubs(cat) {
        document.getElementById('sub-title').innerText = cat;
        const list = document.getElementById('sub-list'); list.innerHTML = '';
        Object.keys(trainingData[cat]).forEach(sub => {
            let b = document.createElement('button'); b.className = 'btn-list'; b.innerHTML = sub + ' <span>>></span>';
            b.onclick = () => showEx(cat, sub); list.appendChild(b);
        }); openModal('subModal');
    }
    function showEx(cat, sub) {
        document.getElementById('ex-title').innerText = sub;
        const list = document.getElementById('ex-list'); list.innerHTML = '';
        trainingData[cat][sub].forEach(ex => {
            let b = document.createElement('button'); b.className = 'btn-list'; b.innerHTML = `<span>${ex}</span> <span>${db.records[ex] || 0} KG</span>`;
            b.onclick = () => { window.currentEx = ex; document.getElementById('final-ex-name').innerText = ex; openModal('weightModal'); };
            list.appendChild(b);
        }); document.getElementById('ex-back-btn').onclick = () => showSubs(cat); openModal('exModal');
    }
    function addExp() {
        const val = parseFloat(document.getElementById('weight-input').value);
        if(val) { 
            db.records[window.currentEx] = Math.max(val, db.records[window.currentEx] || 0); db.exp += 25; 
            if(db.exp >= 100) { 
                db.lvl++; db.exp = 0; 
                document.body.classList.add('flash'); setTimeout(() => document.body.classList.remove('flash'), 500);
            } 
            save(); update(); closeModal('weightModal'); 
        }
        document.getElementById('weight-input').value = '';
    }
    function save() { localStorage.setItem('SYSTEM_V19', JSON.stringify(db)); }
    function update() {
        document.getElementById('current-lvl').innerText = db.lvl;
        document.getElementById('exp-bar').style.width = db.exp + '%';
        document.getElementById('exp-bar').innerText = db.exp + '%';
        let rank = "BRONZE", letter = "E", col = "#cd7f32", icon = icons.fist;
        if(db.lvl >= 5) { rank = "SILVER"; letter = "C"; col = "#c0c0c0"; icon = icons.skull; }
        if(db.lvl >= 20) { rank = "GOLD"; letter = "B"; col = "#ffd700"; }
        document.getElementById('rank-word').innerText = rank;
        document.getElementById('rank-word').style.color = col;
        document.getElementById('rank-let').innerText = letter;
        document.getElementById('svg-path').setAttribute('d', icon);
    }
    initCats(); update();
</script>
</body>
</html>
