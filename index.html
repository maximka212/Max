<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM: OMNI-ATLAS v30.9</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --neon: #00d4ff; --danger: #ff0044; --rank-color: #cd7f32; }
        body { background: var(--bg); background-image: radial-gradient(circle at 50% 50%, #0a111a 0%, #000 90%); color: #eee; font-family: 'Orbitron', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; flex-direction: column; align-items: center; margin-top: 35px; z-index: 10; }
        .rank-display { font-size: 1.2em; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .sys-time { font-size: 0.8em; color: var(--danger); text-shadow: 0 0 8px var(--danger); margin-top: 5px; font-weight: 700; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; padding-bottom: 100px; box-sizing: border-box; }
        .page { display: none; width: 100%; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .lvl-bar { width: 100%; height: 14px; background: #080808; border: 1px solid var(--neon); border-radius: 7px; margin: 15px 0; overflow: hidden; }
        #exp-fill { height: 100%; background: var(--neon); transition: 0.6s ease-out; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #050507; border-top: 2px solid #1a1a22; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; z-index: 999; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #444; font-size: 0.55em; cursor: pointer; }
        .nav-item.active { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .list-item { width: 100%; padding: 16px; background: rgba(255,255,255,0.02); border: 1px solid #1a1a20; color: #fff; margin-bottom: 8px; border-radius: 8px; font-size: 0.75em; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .list-item.done { border-left: 4px solid #00ff88; color: #00ff88; background: rgba(0, 255, 136, 0.05); }
        .sys-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--neon); color: var(--neon); padding: 10px; font-family: 'Orbitron'; font-size: 0.6em; border-radius: 5px; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .input-box { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; margin-bottom: 12px; font-family: 'Orbitron'; text-align: center; outline: none; box-sizing: border-box; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal { width: 85%; background: #0a0a0c; border: 1px solid var(--neon); border-radius: 15px; padding: 25px; text-align: center; }
    </style>
</head>
<body>

    <div id="lvlUpOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; display:none; flex-direction:column; align-items:center; justify-content:center;" onclick="this.style.display='none'">
        <h1 style="color:var(--neon); font-size: 2.5em; text-shadow: 0 0 20px var(--neon);">LEVEL UP</h1>
        <div id="new-lvl-text" style="color:#fff; font-size: 1.2em;"></div>
    </div>

    <div class="header">
        <div class="rank-display">
            <span id="rank-name">BRONZE</span> 
            <span id="rank-letter" style="color:var(--danger); border: 1px solid var(--danger); padding: 2px 8px; border-radius: 4px;">E</span>
        </div>
        <div class="sys-time" id="clock">00:00:00</div>
    </div>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div style="text-align: center; margin-top: 50px;">
                <h3 id="p-display-name" style="letter-spacing: 3px;">PLAYER</h3>
                <div style="font-size: 0.8em; color: var(--neon);">LEVEL <span id="lvl-num">1</span></div>
                <div class="lvl-bar"><div id="exp-fill"></div></div>
            </div>
        </div>

        <div id="page-quests" class="page">
            <button class="sys-btn" onclick="rerollQuests()">[ REROLL ]</button>
            <button class="sys-btn" onclick="addExtraQuest()">[ + QUEST ]</button>
            <div id="quest-list"></div>
        </div>

        <div id="page-db" class="page">
            <div id="db-back" style="display:none; color:var(--neon); font-size: 0.7em; margin-bottom:15px; cursor:pointer;" onclick="goBackDB()">← BACK</div>
            <h2 id="db-title" style="color:var(--neon); font-size: 0.8em; margin-bottom: 15px;">DATABASE</h2>
            <div id="db-list"></div>
        </div>

        <div id="page-ranks" class="page">
            <div id="rank-list-ui"></div>
        </div>

        <div id="page-user" class="page">
            <input type="text" id="in-name" class="input-box" placeholder="IDENTIFIER">
            <button class="list-item" style="justify-content:center; background:var(--neon); color:#000;" onclick="saveProfile()">SYNC DATA</button>
            <div id="pr-list"></div>
        </div>
    </div>

    <div id="inputOverlay" class="overlay">
        <div class="modal">
            <h4 id="modal-title" style="color:var(--neon); margin-bottom:15px;"></h4>
            <input type="number" id="input-w" class="input-box" placeholder="KG">
            <button class="list-item" style="justify-content:center; background:var(--danger);" onclick="confirmEntry()">EXECUTE</button>
            <p onclick="closeInput()" style="font-size:0.6em; color:#444; margin-top:10px; cursor:pointer;">ABORT</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('home', this)">HOME</div>
        <div class="nav-item" onclick="showPage('quests', this)">QUESTS</div>
        <div class="nav-item" onclick="showPage('db', this)">DB</div>
        <div class="nav-item" onclick="showPage('ranks', this)">RANKS</div>
        <div class="nav-item" onclick="showPage('user', this)">USER</div>
    </div>

<script>
    const trainingDB = {
        'ГРУДЬ': {
            'ВЕРХ': ['Жим штанги (наклон)', 'Жим гантелей (наклон)', 'Разводка гантелей (наклон)', 'Жим в Хаммере (вверх)', 'Сведения в кроссовере (снизу)', 'Отжимания (ноги на скамье)', 'Жим Смита (наклон)'],
            'СЕРЕДИНА': ['Жим штанги лежа', 'Жим гантелей лежа', 'Сведения в пек-дек (бабочка)', 'Жим в Хаммере горизонтальный', 'Сведения в кроссовере (перед собой)', 'Жим Смита лежа', 'Отжимания на полу (классика)'],
            'НИЗ': ['Жим штанги (отриц. наклон)', 'Жим гантелей (отриц. наклон)', 'Брусья (акцент на грудь)', 'Сведения в кроссовере (сверху)', 'Жим в Хаммере (вниз)', 'Пуловер с гантелью', 'Разводка (отриц. наклон)']
        },
        'СПИНА': {
            'ТОЛЩИНА': ['Тяга штанги в наклоне', 'Тяга Т-грифа', 'Тяга гантели одной рукой', 'Тяга Хаммера (горизонт)', 'Тяга блока к поясу сидя', 'Тяга гири в упоре', 'Тяга штанги обратным хватом'],
            'ШИРИНА': ['Подтягивания (широким)', 'Тяга верхнего блока (к груди)', 'Тяга верхнего блока (за голову)', 'Тяга Хаммера (вертикальная)', 'Тяга блока узким хватом', 'Пуловер в кроссовере стоя', 'Гравитрон'],
            'НИЗ СПИНЫ': ['Становая тяга', 'Гиперэкстензия', 'Становая тяга (сумо)', 'Наклоны со штангой (Good Morning)', 'Лодочка', 'Тяга на прямых ногах', 'Румынская тяга'],
            'ТРАПЕЦИИ': ['Шраги со штангой', 'Шраги с гантелями', 'Шраги в Смите', 'Шраги в Хаммере', 'Тяга штанги к подбородку', 'Шраги на нижнем блоке', 'Прогулка фермера']
        },
        'ПЛЕЧИ': {
            'ПЕРЕДНЯЯ ДЕЛЬТА': ['Армейский жим', 'Жим гантелей сидя', 'Подъем штанги перед собой', 'Подъем гантелей перед собой', 'Жим Арнольда', 'Жим в Смите перед собой', 'Подъем блина перед собой'],
            'СРЕДНЯЯ ДЕЛЬТА': ['Махи гантелями в стороны', 'Тяга блока в сторону', 'Махи в тренажере', 'Тяга штанги к подбородку (широким)', 'Махи гантелей сидя', 'Махи одной рукой в кроссовере', 'Махи "Лифт"'],
            'ЗАДНЯЯ ДЕЛЬТА': ['Махи гантелями в наклоне', 'Обратная бабочка (пек-дек)', 'Тяга "Лицо" (Face Pull)', 'Тяга блока на заднюю дельту', 'Махи в наклоне сидя', 'Тяга гантелей лежа на животе', 'Разведения в кроссовере (верх)']
        },
        'РУКИ': {
            'БИЦЕПС': ['Подъем штанги стоя', 'Подъем гантелей (супинация)', 'Молотки', 'Скамья Скотта (штанга)', 'Концентрированный подъем', 'Подъем гантелей сидя (наклон)', 'Бицепс в кроссовере (верх)'],
            'ТРИЦЕПС': ['Жим лежа узким хватом', 'Французский жим', 'Разгибания на блоке (канат)', 'Отжимания на брусьях (узко)', 'Разгибания гантели из-за головы', 'Обратные отжимания', 'Разгибания одной рукой в кроссовере'],
            'ПРЕДПЛЕЧЬЯ': ['Сгибания кистей со штангой', 'Разгибания кистей со штангой', 'Сгибания "Зоттмана"', 'Удержание блинов', 'Эспандер', 'Наматывание троса', 'Подъем штанги обратным хватом']
        },
        'НОГИ': {
            'КВАДРИЦЕПС': ['Приседания со штангой', 'Жим ногами', 'Разгибания в тренажере', 'Гакк-приседания', 'Выпады с гантелями', 'Приседания "Плие"', 'Болгарские приседания'],
            'БИЦЕПС БЕДРА': ['Сгибания ног лежа', 'Сгибания ног сидя', 'Мертвая тяга (румынская)', 'Сгибания каждой ногой стоя', 'Гиперэкстензия (акцент бедро)', 'Тяга Кинга', 'Мостик с весом'],
            'ИКРЫ': ['Подъемы на носки стоя', 'Подъемы на носки сидя', 'Подъемы в жиме ногами', 'Подъемы "Ослик"', 'Подъемы на одну ногу', 'Подъемы в Смите', 'Пружинки без веса']
        }
    };

    let db = JSON.parse(localStorage.getItem('SYSTEM_V30_9')) || {
        lvl: 1, exp: 0, pr: {}, 
        activeQuests: [
            { text: "Записать 3 упражнения", done: false, current: 0, target: 3 },
            { text: "Новый PR рекорд", done: false },
            { text: "Тяжелая тренировка", done: false }
        ],
        lastDate: new Date().toDateString(),
        profile: {name:'PLAYER'}
    };

    let dbStack = [];

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(pageId === 'db') { dbStack = []; renderDB(); }
        if(pageId === 'quests') renderQuests();
    }

    function renderDB() {
        const area = document.getElementById('db-list');
        const title = document.getElementById('db-title');
        const back = document.getElementById('db-back');
        area.innerHTML = '';
        
        if(dbStack.length === 0) {
            title.innerText = "BODY SECTORS"; back.style.display = "none";
            Object.keys(trainingDB).forEach(cat => area.innerHTML += `<div class="list-item" onclick="pushDB('${cat}')">${cat} <span>>></span></div>`);
        } else if(dbStack.length === 1) {
            title.innerText = dbStack[0]; back.style.display = "block";
            Object.keys(trainingDB[dbStack[0]]).forEach(sub => area.innerHTML += `<div class="list-item" onclick="pushDB('${sub}')">${sub} <span>>></span></div>`);
        } else {
            title.innerText = dbStack[1]; back.style.display = "block";
            trainingDB[dbStack[0]][dbStack[1]].forEach(ex => area.innerHTML += `<div class="list-item" onclick="openInput('${ex}')">${ex} <span>LOG</span></div>`);
        }
    }

    function pushDB(v) { dbStack.push(v); renderDB(); }
    function goBackDB() { dbStack.pop(); renderDB(); }

    function openInput(ex) { window.currentEx = ex; document.getElementById('modal-title').innerText = ex; document.getElementById('inputOverlay').style.display = 'flex'; }
    function closeInput() { document.getElementById('inputOverlay').style.display = 'none'; }

    function confirmEntry() {
        const w = parseFloat(document.getElementById('input-w').value) || 0;
        if(w > 0) {
            if(!db.pr[window.currentEx] || w > db.pr[window.currentEx].w) { db.pr[window.currentEx] = {w}; db.activeQuests[1].done = true; }
            db.exp += 25; checkLvl(); save(); update(); closeInput();
        }
    }

    function checkLvl() {
        while(db.exp >= 100) { db.lvl++; db.exp -= 100; document.getElementById('lvlUpOverlay').style.display = 'flex'; }
    }

    function save() { localStorage.setItem('SYSTEM_V30_9', JSON.stringify(db)); }

    function update() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        if(db.lastDate !== now.toDateString()) {
            db.activeQuests = [{ text: "Записать 3 упражнения", done: false, current: 0, target: 3 },{ text: "Новый PR рекорд", done: false },{ text: "Тяжелая тренировка", done: false }];
            db.lastDate = now.toDateString(); save();
        }
        document.getElementById('lvl-num').innerText = db.lvl;
        document.getElementById('exp-fill').style.width = db.exp + '%';
        
        const ranks = [
            {lvl: 1, n: "BRONZE", l: "E", c: "#cd7f32"}, {lvl: 10, n: "SILVER", l: "D", c: "#c0c0c0"},
            {lvl: 25, n: "GOLD", l: "C", c: "#ffd700"}, {lvl: 50, n: "PLATINUM", l: "B", c: "#00d4ff"},
            {lvl: 100, n: "DIAMOND", l: "A", c: "#b9f2ff"}, {lvl: 250, n: "GRANDMASTER", l: "SSS", c: "#ff0044"},
            {lvl: 500, n: "THE ABSOLUTE", l: "OVERLORD", c: "#bc13fe"}
        ];
        let curR = ranks[0]; ranks.forEach(x => { if(db.lvl >= x.lvl) curR = x; });
        document.getElementById('rank-name').innerText = curR.n;
        document.getElementById('rank-letter').innerText = curR.l;
        document.body.style.setProperty('--rank-color', curR.c);
        document.getElementById('rank-letter').style.color = curR.c;
        document.getElementById('rank-letter').style.borderColor = curR.c;
    }

    setInterval(update, 1000);
    update();
</script>
</body>
</html>
