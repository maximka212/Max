<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM: FULL DATABASE v29</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --neon: #00d4ff; --danger: #ff0044; --rank-color: #cd7f32; }
        body { 
            background: var(--bg); background-image: radial-gradient(circle at 50% 50%, #0a111a 0%, #000 90%);
            color: #eee; font-family: 'Orbitron', sans-serif; margin: 0; padding: 0; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }
        
        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; margin-top: 35px; }
        .rank-display { font-size: 1.3em; font-weight: 900; letter-spacing: 2px; }
        .sys-time { font-size: 0.6em; color: var(--neon); opacity: 0.7; margin-top: 4px; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; padding-bottom: 90px; }
        
        .page { display: none; width: 100%; flex-direction: column; animation: fadeIn 0.3s ease; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HOME ELEMENTS */
        .icon-circle { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--rank-color); display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 10px var(--rank-color)); margin: 20px auto; }
        .icon-svg { width: 80px; height: 80px; fill: var(--rank-color); }
        .lvl-bar { width: 100%; height: 12px; background: #080808; border: 1px solid var(--neon); border-radius: 6px; margin: 10px 0; overflow: hidden; }
        #exp-fill { height: 100%; background: var(--neon); transition: 0.5s; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #050507; border-top: 1px solid #1a1a22; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #444; font-size: 0.5em; cursor: pointer; }
        .nav-item.active { color: var(--neon); text-shadow: 0 0 8px var(--neon); }
        .nav-icon { width: 18px; height: 18px; fill: currentColor; }

        /* LIST ITEMS */
        .list-item { width: 100%; padding: 16px; background: rgba(255,255,255,0.02); border: 1px solid #15151a; color: #fff; margin-bottom: 8px; border-radius: 8px; font-size: 0.65em; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .list-item.done { border-left: 4px solid #00ff88; color: #00ff88; }
        .back-link { color: var(--neon); font-size: 0.7em; margin-bottom: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        /* INPUT OVERLAY */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal { width: 85%; background: #0a0a0c; border: 1px solid var(--neon); border-radius: 12px; padding: 25px; text-align: center; }
        .input-box { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 5px; margin-bottom: 10px; font-family: 'Orbitron'; text-align: center; outline: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="rank-display"><span id="rank-name" style="color:var(--rank-color)">BRONZE</span> <span style="color:var(--danger)">E</span></div>
        <div class="sys-time" id="clock">00:00:00</div>
    </div>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div class="icon-circle"><svg class="icon-svg" viewBox="0 0 24 24"><path id="svg-path" d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM15.5 13.5L14 15.5H10L8.5 13.5V10.5L10 8.5H14L15.5 10.5V13.5Z"/></svg></div>
            <div style="text-align: center;">
                <h3 id="p-display-name">PLAYER</h3>
                <div style="font-size: 0.7em; color: var(--neon); margin-bottom: 5px;">LVL <span id="lvl-num">1</span></div>
                <div class="lvl-bar"><div id="exp-fill"></div></div>
                <div style="font-size: 0.6em; color: #444; margin-top: 10px;">DAILY QUESTS COMPLETED: <span id="daily-count" style="color:var(--neon)">0</span></div>
            </div>
        </div>

        <div id="page-quests" class="page">
            <h2 style="color:var(--neon); font-size: 0.8em; border-left: 2px solid var(--neon); padding-left: 10px; margin-bottom: 20px;">TODAY'S LOG</h2>
            <div id="quest-list"></div>
        </div>

        <div id="page-db" class="page">
            <div id="db-back" class="back-link" style="display:none" onclick="goBackDB()">← Назад</div>
            <h2 id="db-title" style="color:var(--neon); font-size: 0.8em; margin-bottom: 20px;">MUSCLE DATABASE</h2>
            <div id="db-list"></div>
        </div>

        <div id="page-pr" class="page">
            <h2 style="color:var(--neon); font-size: 0.8em; margin-bottom: 20px;">RECORDS</h2>
            <div id="pr-list"></div>
        </div>

        <div id="page-user" class="page">
            <h2 style="color:var(--neon); font-size: 0.8em; margin-bottom: 20px;">PROFILE</h2>
            <input type="text" id="in-name" class="input-box" placeholder="NAME">
            <button class="list-item" style="justify-content:center; background:var(--neon); color:#000; font-weight:900;" onclick="saveProfile()">SYNC</button>
        </div>
    </div>

    <div id="inputOverlay" class="overlay">
        <div class="modal">
            <h4 id="modal-title" style="color:var(--neon); margin-bottom:15px; font-size:0.9em;"></h4>
            <input type="number" id="input-w" class="input-box" placeholder="WEIGHT (KG)">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="number" id="input-s" class="input-box" placeholder="SETS">
                <input type="number" id="input-r" class="input-box" placeholder="REPS">
            </div>
            <button class="list-item" style="justify-content:center; background:var(--danger); border:none; font-weight:900;" onclick="confirmEntry()">REGISTER ENTRY</button>
            <p style="font-size:0.6em; color:#444; margin-top:10px; cursor:pointer;" onclick="closeInput()">CANCEL</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('home', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>HOME</div>
        <div class="nav-item" onclick="showPage('quests', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3H5v14h14V3z M12 17l-5-5 1.4-1.4 3.6 3.6 7.6-7.6L21 8l-9 9z"/></svg>QUESTS</div>
        <div class="nav-item" onclick="showPage('db', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 13.43 12 12 13.43 15.57 17 12 20.57 13.43 22 17 18.43 20.57 22 22 20.57 18.43 17z M4 5.43L5.43 4 17 15.57 15.57 17 4 5.43z"/></svg>DB</div>
        <div class="nav-item" onclick="showPage('pr', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.5 1.9 4.6 4.4 4.9.6 1.5 2 2.6 3.6 3V19H7v2h10v-2h-4v-3.1c1.6-.3 3-1.4 3.6-3 2.5-.3 4.4-2.4 4.4-4.9V7c0-1.1-.9-2-2-2z"/></svg>PR</div>
        <div class="nav-item" onclick="showPage('user', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z"/></svg>USER</div>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('SYSTEM_V29')) || {
        lvl: 1, exp: 0, pr: {}, daily: {}, dailyDoneCount: 0,
        lastDate: new Date().toDateString(),
        profile: {name:'PLAYER'}
    };

    const trainingDB = {
        'ГРУДЬ': { 
            'ВЕРХ': ['Жим штанги накл.', 'Жим гантелей накл.', 'Разводка накл.'],
            'ЦЕНТР': ['Жим лежа', 'Гантели гориз.', 'Бабочка', 'Хаммер'],
            'НИЗ': ['Брусья', 'Кроссовер']
        },
        'СПИНА': { 
            'ШИРИНА': ['Подтягивания', 'Тяга верхнего блока', 'Пуловер'],
            'ТОЛЩИНА': ['Тяга штанги в накл.', 'Тяга гантели', 'Рычажная тяга'],
            'ПОЯСНИЦА': ['Становая тяга', 'Гиперэкстензия']
        },
        'НОГИ': { 
            'КВАДРИЦЕПС': ['Приседания', 'Жим ногами', 'Разгибания'],
            'БИЦ. БЕДРА': ['Мертвая тяга', 'Сгибания лежа'],
            'ИКРЫ': ['Подъемы на носки']
        },
        'ПЛЕЧИ': { 
            'ПЕРЕД': ['Жим штанги стоя', 'Армейский жим'],
            'СРЕДНЯЯ': ['Махи гантелями', 'Тяга к подбородку'],
            'ЗАДНЯЯ': ['Махи в наклоне', 'Face Pull']
        },
        'РУКИ': { 
            'БИЦЕПС': ['Штанга стоя', 'Молотки', 'Скамья Скотта'],
            'ТРИЦЕПС': ['Жим узким хватом', 'Французский жим', 'Блок'],
            'ПРЕДПЛЕЧЬЯ': ['Сгибания кистей']
        },
        'ПРЕСС/ШЕЯ': {
            'ПРЕСС': ['Скручивания', 'Подъем ног', 'Планк (сек)'],
            'ШЕЯ': ['Подъемы головы с весом']
        }
    };

    let dbStack = [];

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(pageId === 'quests') renderQuests();
        if(pageId === 'db') { dbStack = []; renderDB(); }
        if(pageId === 'pr') renderPR();
    }

    function renderQuests() {
        const area = document.getElementById('quest-list'); area.innerHTML = '';
        const keys = Object.keys(db.daily);
        if(keys.length === 0) area.innerHTML = '<p style="text-align:center; color:#333; font-size:0.6em; margin-top:20px;">NO QUESTS COMPLETED TODAY</p>';
        keys.forEach(ex => {
            area.innerHTML += `<div class="list-item done"><span>${ex}</span> <span>[DONE]</span></div>`;
        });
    }

    function renderDB() {
        const area = document.getElementById('db-list');
        const title = document.getElementById('db-title');
        const back = document.getElementById('db-back');
        area.innerHTML = '';

        if(dbStack.length === 0) {
            title.innerText = "MUSCLE GROUPS"; back.style.display = "none";
            Object.keys(trainingDB).forEach(cat => {
                area.innerHTML += `<div class="list-item" onclick="pushDB('${cat}')">${cat} <span>>></span></div>`;
            });
        } else if(dbStack.length === 1) {
            title.innerText = dbStack[0]; back.style.display = "block";
            Object.keys(trainingDB[dbStack[0]]).forEach(sub => {
                area.innerHTML += `<div class="list-item" onclick="pushDB('${sub}')">${sub} <span>>></span></div>`;
            });
        } else {
            title.innerText = dbStack[1]; back.style.display = "block";
            trainingDB[dbStack[0]][dbStack[1]].forEach(ex => {
                let done = db.daily[ex];
                area.innerHTML += `<div class="list-item ${done?'done':''}" onclick="openInput('${ex}')">
                    <span>${ex}</span> <span>${done?'DONE':'LOG'}</span>
                </div>`;
            });
        }
    }

    function pushDB(val) { dbStack.push(val); renderDB(); }
    function goBackDB() { dbStack.pop(); renderDB(); }

    function openInput(ex) {
        window.currentEx = ex;
        document.getElementById('modal-title').innerText = ex;
        document.getElementById('inputOverlay').style.display = 'flex';
    }
    function closeInput() { document.getElementById('inputOverlay').style.display = 'none'; }

    function confirmEntry() {
        const w = parseFloat(document.getElementById('input-w').value) || 0;
        const s = parseInt(document.getElementById('input-s').value) || 0;
        const r = parseInt(document.getElementById('input-r').value) || 0;
        if(w > 0) {
            if(!db.pr[window.currentEx] || w > db.pr[window.currentEx].w) db.pr[window.currentEx] = {w,s,r};
            if(!db.daily[window.currentEx]) {
                db.daily[window.currentEx] = true; db.dailyDoneCount++; db.exp += 20;
                if(db.dailyDoneCount === 3) db.exp += 50;
                if(db.dailyDoneCount === 5) db.exp += 100;
            }
            while(db.exp >= 100) { db.lvl++; db.exp -= 100; }
            save(); update(); closeInput(); renderDB();
        }
    }

    function renderPR() {
        const area = document.getElementById('pr-list'); area.innerHTML = '';
        for(let ex in db.pr) {
            let r = db.pr[ex];
            area.innerHTML += `<div class="list-item"><span>${ex}</span> <b>${r.w} KG</b></div>`;
        }
    }

    function saveProfile() {
        db.profile.name = document.getElementById('in-name').value || 'PLAYER';
        save(); update(); alert("SYNCED");
    }

    function save() { localStorage.setItem('SYSTEM_V29', JSON.stringify(db)); }

    function update() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        if(db.lastDate !== now.toDateString()) {
            db.daily = {}; db.dailyDoneCount = 0; db.lastDate = now.toDateString(); save();
        }
        document.getElementById('lvl-num').innerText = db.lvl;
        document.getElementById('p-display-name').innerText = db.profile.name;
        document.getElementById('daily-count').innerText = db.dailyDoneCount;
        document.getElementById('exp-fill').style.width = db.exp + '%';
        
        const rankData = [{lvl:1, name:"BRONZE", col:"#cd7f32"}, {lvl:10, name:"SILVER", col:"#c0c0c0"}, {lvl:25, name:"GOLD", col:"#ffd700"}, {lvl:50, name:"PLATINUM", col:"#00d4ff"}];
        let cur = rankData[0];
        for(let r of rankData) if(db.lvl >= r.lvl) cur = r;
        document.getElementById('rank-name').innerText = cur.name;
        document.body.style.setProperty('--rank-color', cur.col);
    }

    setInterval(update, 1000);
    update();
</script>
</body>
</html>
